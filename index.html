    <script>

        let currentRecipe = "";

        async function generateRecipe() {

            let food = document.getElementById("food").value;

            let response = await fetch("http://localhost:3000/generateRecipe", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    food: food
                })

            });

            let data = await response.json();

            currentRecipe = data.recipe;

            document.getElementById("result").innerText = currentRecipe;

        }
